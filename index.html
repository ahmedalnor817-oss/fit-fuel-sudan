<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Fuel Elite | السين تجربة النخبة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #050505; --white: #ffffff; }

        body { font-family: 'Noto Kufi Arabic', sans-serif; margin: 0; background: var(--black); color: var(--white); overflow-x: hidden; }

        /* قسم فيديو الهيرو */
        .hero-video-container {
            position: relative; height: 100vh; width: 100%;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        #hero-video {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%; width: auto; height: auto;
            transform: translate(-50%, -50%); z-index: -1;
            filter: brightness(0.4) grayscale(0.2);
        }

        .hero-content { text-align: center; z-index: 10; padding: 20px; }
        .hero-content h1 { font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; margin: 0; line-height: 1; }
        .hero-content span { color: var(--gold); }

        /* حاسبة السعرات الجانبية الفاخرة */
        #side-calc {
            position: fixed; left: -340px; top: 15%; width: 320px;
            background: rgba(15, 15, 15, 0.9); border: 1px solid var(--gold);
            border-radius: 0 40px 40px 0; padding: 30px; z-index: 2000;
            backdrop-filter: blur(20px); box-shadow: 20px 0 50px rgba(0,0,0,0.9);
        }
        #side-calc.open { left: 0; }
        .calc-toggle {
            position: absolute; right: -60px; top: 20px; background: var(--gold);
            width: 60px; height: 60px; border-radius: 0 20px 20px 0;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 28px; box-shadow: 10px 0 20px rgba(212,175,55,0.2);
        }

        /* شبكة الباقات بتأثير الـ Glassmorphism */
        .plans-section { padding: 100px 8%; position: relative; }
        .plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; }
        
        .plan-card {
            height: 550px; border-radius: 50px; position: relative; overflow: hidden;
            cursor: pointer; border: 1px solid #222;
        }
        .plan-card img { width: 100%; height: 100%; object-fit: cover; transition: 1.5s; }
        .plan-card:hover img { transform: scale(1.1); }
        .plan-card-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 30%, transparent);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 40px;
        }

        /* قسم المنيو الفيديوي (اختياري) */
        .video-reel {
            display: flex; gap: 20px; overflow-x: auto; padding: 40px 8%;
            scrollbar-width: none;
        }
        .reel-item {
            min-width: 250px; height: 400px; background: #111;
            border-radius: 30px; border: 1px solid #333; overflow: hidden;
        }

        .btn-premium {
            background: var(--gold); color: black; padding: 18px 40px;
            border-radius: 50px; font-weight: 900; border: none; cursor: pointer;
            font-size: 18px; margin-top: 20px; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(212,175,55,0.3);
        }

        /* تحسينات المودال */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .modal-content {
            background: #0a0a0a; width: 90%; max-width: 600px; height: 80vh;
            border-radius: 40px; padding: 40px; border: 1px solid #222; overflow-y: auto;
        }

        footer { text-align: center; padding: 100px 8%; opacity: 0.5; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <div id="side-calc">
        <div class="calc-toggle" onclick="toggleCalc()">⚖️</div>
        <h2 style="color:var(--gold); margin-top:0;">حلل جسمك 🧬</h2>
        <input type="number" id="w" placeholder="الوزن (كجم)" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; background:#000; border:1px solid #333; color:#fff;">
        <input type="number" id="h" placeholder="الطول (سم)" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; background:#000; border:1px solid #333; color:#fff;">
        <button onclick="calculateBMR()" class="btn-premium" style="width:100%; font-size:16px;">تحليل النتيجة</button>
        <div id="bmr-res" style="margin-top:20px; color:var(--gold); font-weight:bold;"></div>
    </div>

    <section class="hero-video-container">
        <video autoplay muted loop playsinline id="hero-video">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-frying-diced-meat-in-a-pan-close-up-43158-large.mp4" type="video/mp4">
        </video>
        <div class="hero-content" data-aos="zoom-in">
            <h1>نطبخ لـ <span>النخبة</span></h1>
            <p style="font-size: 1.5rem; margin-top: 20px;">تجربة غذائية تتخطى حدود المذاق</p>
            <button class="btn-premium" onclick="window.scrollTo(0, 1000)">ابدأ اشتراكك الآن</button>
        </div>
    </section>

    <section class="plans-section">
        <div style="text-align:center; margin-bottom:60px;" data-aos="fade-up">
            <h2 style="font-size:3rem;">باقات <span>حصرية</span></h2>
            <p style="color:#888;">اختر المستوى الذي يناسب طموحك</p>
        </div>

        <div class="plans-grid">
            <div class="plan-card" data-aos="fade-up" data-aos-delay="100" onclick="openMenu('باقة دايت كير')">
                <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800">
                <div class="plan-card-overlay">
                    <h2>باقة دايت كير</h2>
                    <p>التوازن والنشاط اليومي</p>
                    <div style="font-size:24px; color:var(--gold); font-weight:900;">2,350 ريال</div>
                </div>
            </div>

            <div class="plan-card" data-aos="fade-up" data-aos-delay="200" onclick="openMenu('باقة الرشاقة')">
                <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=800">
                <div class="plan-card-overlay">
                    <h2>باقة الرشاقة</h2>
                    <p>لحرق الدهون بأعلى جودة</p>
                    <div style="font-size:24px; color:var(--gold); font-weight:900;">2,500 ريال</div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Fit Fuel Elite | تصميم عالمي للنخبة السعودية</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        function toggleCalc() {
            document.getElementById('side-calc').classList.toggle('open');
        }

        function calculateBMR() {
            const w = document.getElementById('w').value;
            const h = document.getElementById('h').value;
            if(w && h) {
                let bmi = (w / ((h/100) * (h/100))).toFixed(1);
                document.getElementById('bmr-res').innerText = `كتلة جسمك: ${bmi} - باقة الرشاقة مثالية لك!`;
            }
        }

        // إغلاق عند الضغط خارج الحاسبة
        window.addEventListener('click', function(e) {
            const calc = document.getElementById('side-calc');
            if (!calc.contains(e.target) && calc.classList.contains('open')) {
                calc.classList.remove('open');
            }
        });
    </script>
</body>
</html>
