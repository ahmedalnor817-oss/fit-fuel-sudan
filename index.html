<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fit Fuel Elite | Premium Nutrition</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --gold:#c5a059;
    --dark:#050505;
    --glass:rgba(255,255,255,0.05);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Noto Kufi Arabic',sans-serif;
    background: radial-gradient(circle at top,#111,#000);
    color:white;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    position:fixed;
    width:100%;
    backdrop-filter:blur(12px);
    background:rgba(0,0,0,0.6);
    z-index:1000;
}

.logo{
    font-weight:900;
    color:var(--gold);
    font-size:24px;
    letter-spacing:2px;
}

.btn{
    border:1px solid var(--gold);
    padding:10px 18px;
    border-radius:12px;
    color:var(--gold);
    text-decoration:none;
    transition:0.3s;
}
.btn:hover{
    background:var(--gold);
    color:black;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0 20px;
}

.hero h1{
    font-size:clamp(2rem,5vw,3.5rem);
    line-height:1.3;
}

.hero span{color:var(--gold);}

.hero p{
    color:#aaa;
    margin:20px 0;
}

/* GLASS BOX */
.glass{
    margin-top:40px;
    padding:35px;
    background:var(--glass);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    backdrop-filter:blur(15px);
    max-width:500px;
    width:100%;
}

input,select{
    width:100%;
    margin:10px 0;
    padding:14px;
    background:#000;
    border:1px solid #333;
    color:white;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    background:linear-gradient(45deg,var(--gold),#ffd27a);
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

#res{
    margin-top:15px;
    display:none;
    color:var(--gold);
}

/* PLANS */
.plans{
    padding:80px 8%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

.plan{
    height:400px;
    border-radius:25px;
    overflow:hidden;
    position:relative;
    background-size:cover;
    display:flex;
    align-items:flex-end;
    transition:0.4s;
}

.plan:hover{transform:scale(1.05);}

.plan::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top,#000,transparent);
}

.plan-info{
    position:relative;
    padding:25px;
    z-index:2;
}

.price{
    color:var(--gold);
    font-size:22px;
}

/* FOOTER */
footer{
    text-align:center;
    padding:50px;
    border-top:1px solid #222;
}
</style>
</head>

<body>

<header>
<div class="logo">FIT FUEL</div>
<a href="https://wa.me/966563683212" class="btn">VIP</a>
</header>

<section class="hero">
<h1>تجربة <span>نخبوية</span> لصحتك</h1>
<p>أنظمة غذائية فاخرة مصممة لنتائج حقيقية</p>

<div class="glass">
<input type="number" id="w" placeholder="الوزن">
<input type="number" id="h" placeholder="الطول">
<input type="number" id="a" placeholder="العمر">

<select id="g">
<option value="m">ذكر</option>
<option value="f">أنثى</option>
</select>

<button onclick="calc()">احسب الآن</button>
<div id="res"></div>
</div>
</section>

<section class="plans">
<div class="plan" style="background-image:url('https://images.unsplash.com/photo-1543339308-43e59d6b73a6?w=800')">
<div class="plan-info">
<h3>باقة الدايت</h3>
<p>خسارة دهون باحتراف</p>
<div class="price">2500 ريال</div>
</div>
</div>

<div class="plan" style="background-image:url('https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=800')">
<div class="plan-info">
<h3>باقة الرشاقة</h3>
<p>جسم مثالي ومتوازن</p>
<div class="price">2700 ريال</div>
</div>
</div>

<div class="plan" style="background-image:url('https://images.unsplash.com/photo-1541544181051-95c556b60408?w=800')">
<div class="plan-info">
<h3>باقة الضخامة</h3>
<p>بناء عضلات قوي</p>
<div class="price">3200 ريال</div>
</div>
</div>
</section>

<footer>
<h3 style="color:var(--gold)">FIT FUEL ELITE</h3>
<p>Saudi Arabia</p>
</footer>

<script>
function calc(){
let w=document.getElementById("w").value;
let h=document.getElementById("h").value;
let a=document.getElementById("a").value;
let g=document.getElementById("g").value;
let res=document.getElementById("res");

if(w&&h&&a){
let bmr=(g=="m")?(10*w+6.25*h-5*a+5):(10*w+6.25*h-5*a-161);
res.style.display="block";
res.innerHTML="احتياجك اليومي: "+Math.round(bmr)+" سعرة";
}else{
alert("أكمل البيانات");
}
}
</script>

</body>
</html>
