<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diet Program</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    direction: rtl;
}

/* Navbar */
.nav {
    background: white;
    padding: 15px 40px;
    position: fixed;
    width: 100%;
    top: 0;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    z-index: 1000;
}

/* Hero */
.hero {
    height: 90vh;
    background: url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
}

.overlay {
    background: rgba(0,0,0,0.5);
    color: white;
    padding: 40px;
    text-align: center;
}

/* Programs */
.container {
    padding: 100px 40px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
    gap: 20px;
}

.card {
    position: relative;
    height: 320px;
    overflow: hidden;
    border-radius: 15px;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card-overlay {
    position: absolute;
    bottom: 0;
    color: white;
    padding: 20px;
    background: linear-gradient(to top, black, transparent);
}

/* Subscription */
.subscription {
    background: #f5f5f5;
    padding: 50px 20px;
    text-align: center;
}

.plans button {
    margin: 10px;
    padding: 10px 20px;
    border: none;
    background: #00b894;
    color: white;
    cursor: pointer;
    border-radius: 8px;
}

.pricing {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.price-card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 200px;
}

/* Button */
.btn {
    background: #00b894;
    color: white;
    padding: 10px;
    border: none;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 8px;
}
</style>

</head>

<body>

<div class="nav">
    <h2>DIET</h2>
</div>

<!-- Hero -->
<div class="hero">
    <div class="overlay">
        <h1>وجبات صحية جاهزة</h1>
        <p>اختر برنامجك وابدأ اليوم</p>
    </div>
</div>

<!-- Programs -->
<div class="container">
    <h2>برامجنا</h2>

    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd">
            <div class="card-overlay">
                <h3>وازن</h3>
                <p>نظام متوازن</p>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">
            <div class="card-overlay">
                <h3>بروتين عالي</h3>
                <p>لبناء العضلات</p>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1551218808-94e220e084d2">
            <div class="card-overlay">
                <h3>كيتو</h3>
                <p>حرق الدهون</p>
            </div>
        </div>
    </div>
</div>

<!-- Subscription -->
<div class="subscription">
    <h2>اختر اشتراكك</h2>

    <div class="plans">
        <button onclick="setPlan('full')">يوم كامل</button>
        <button onclick="setPlan('lunch')">غداء + عشاء</button>
        <button onclick="setPlan('breakfast')">فطور + غداء</button>
    </div>

    <div class="pricing">

        <div class="price-card">
            <h3>أسبوع</h3>
            <p id="weekPrice">650 ريال</p>
            <button class="btn" onclick="order('أسبوع')">اشترك</button>
        </div>

        <div class="price-card">
            <h3>شهر</h3>
            <p id="monthPrice">2200 ريال</p>
            <button class="btn" onclick="order('شهر')">اشترك</button>
        </div>

    </div>
</div>

<script>
let currentPlan = "full";

function setPlan(plan) {
    currentPlan = plan;

    if(plan === "full") {
        document.getElementById("weekPrice").innerText = "650 ريال";
        document.getElementById("monthPrice").innerText = "2200 ريال";
    } else {
        document.getElementById("weekPrice").innerText = "500 ريال";
        document.getElementById("monthPrice").innerText = "1800 ريال";
    }
}

function order(type) {
    let price = document.getElementById(type === 'أسبوع' ? "weekPrice" : "monthPrice").innerText;

    let message = `مرحبا، اريد الاشتراك (${type}) في خطة ${currentPlan} بسعر ${price}`;
    
    window.open(`https://wa.me/966XXXXXXXXX?text=${encodeURIComponent(message)}`);
}
</script>

</body>
</html>
