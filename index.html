<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Fuel Elite | المنصة المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@100;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; --white: #fff; --gray: #888; }
        * { box-sizing: border-box; transition: 0.3s ease; }
        body { font-family: 'Noto Kufi Arabic', sans-serif; margin: 0; background: var(--bg); color: var(--white); overflow-x: hidden; }

        header { background: rgba(0,0,0,0.95); padding: 20px 8%; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--gold); }

        .container { padding: 40px 8% 150px; }
        .section-title { font-size: 2rem; font-weight: 900; margin: 50px 0 30px; text-align: right; color: var(--gold); border-right: 5px solid var(--gold); padding-right: 15px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        
        .card { background: var(--card); border-radius: 30px; overflow: hidden; border: 1px solid #222; display: flex; flex-direction: column; height: 100%; }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); }
        
        .img-box { height: 200px; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        
        .offer-tag { position: absolute; top: 15px; left: 15px; background: #e74c3c; color: #fff; padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: 900; }
        .package-tag { position: absolute; top: 15px; left: 15px; background: var(--gold); color: #000; padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: 900; }

        .card-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-body h3 { margin: 0 0 10px; font-size: 1.4rem; }

        /* جداول البيانات الغذائية والكميات */
        .info-panel { background: #181818; padding: 12px; border-radius: 15px; margin: 10px 0; border: 1px solid #333; }
        .info-row { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--gray); margin-bottom: 5px; }
        .info-row b { color: var(--white); }

        .food-items { font-size: 0.8rem; color: #bbb; padding-right: 20px; margin: 10px 0; }
        .food-items li { margin-bottom: 5px; list-style-type: circle; }

        .gram-selector { display: flex; gap: 5px; margin-top: 10px; }
        .g-btn { flex: 1; background: transparent; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; }
        .g-btn.active { background: var(--gold); color: #000; font-weight: 900; border-color: var(--gold); }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 15px; border-top: 1px solid #222; }
        .price { font-size: 1.6rem; font-weight: 900; color: var(--gold); }

        .btn-action { background: var(--gold); color: #000; padding: 12px 25px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">FIT FUEL ELITE</div>
    </header>

    <div class="container">
        <h2 class="section-title">البرامج المتاحة</h2>
        <div class="grid">
            </div>
    </div>

</body>
</html>
