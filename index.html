<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diet Programs</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: #fff;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: white;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #00b894;
}

/* Hero */
.hero {
    height: 90vh;
    background: url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
}

.hero-content {
    position: relative;
    color: white;
    text-align: center;
}

.hero h1 {
    font-size: 50px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 18px;
}

/* Programs */
.programs {
    padding: 80px 40px;
}

.section-title {
    text-align: center;
    margin-bottom: 50px;
    font-size: 32px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap: 30px;
}

.card {
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    height: 350px;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px;
    color: white;
}

.card h3 {
    margin: 0;
    font-size: 24px;
}

.card p {
    margin: 5px 0;
    font-size: 14px;
}

.btn {
    background: #00b894;
    padding: 10px 15px;
    border-radius: 8px;
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
    color: white;
}

/* Hover */
.card:hover {
    transform: scale(1.03);
    transition: 0.3s;
}

</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">DIET</div>
    <div>Programs</div>
</div>

<!-- Hero -->
<div class="hero">
    <div class="hero-content">
        <h1>اختر برنامجك الغذائي</h1>
        <p>وجبات صحية جاهزة توصلك يومياً</p>
    </div>
</div>

<!-- Programs -->
<section class="programs">
    <h2 class="section-title">برامجنا</h2>

    <div class="cards">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd">
            <div class="card-overlay">
                <h3>وازن</h3>
                <p>نظام متوازن يومي</p>
                <a href="#" class="btn">استعرض</a>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">
            <div class="card-overlay">
                <h3>بروتين عالي</h3>
                <p>لبناء العضلات</p>
                <a href="#" class="btn">استعرض</a>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1551218808-94e220e084d2">
            <div class="card-overlay">
                <h3>كيتو</h3>
                <p>حرق الدهون</p>
                <a href="#" class="btn">استعرض</a>
            </div>
        </div>

    </div>
</section>

</body>
</html>
