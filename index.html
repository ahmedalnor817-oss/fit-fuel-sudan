<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Fuel Elite | تجربة كالو المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #d4af37; --bg: #f4f7f6; --text: #2d3436; --white: #ffffff; }
        
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Kufi Arabic', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* شاشة التخصيص (Onboarding) */
        #onboarding {
            position: fixed; inset: 0; background: var(--white); z-index: 5000;
            display: flex; flex-direction: column; padding: 40px 10%;
        }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.5s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-next { background: var(--brand); color: #000; width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; margin-top: 20px; font-size: 1.1rem; }

        /* الواجهة الرئيسية */
        header {
            background: var(--white); padding: 15px 5%; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); border-bottom: 1px solid #eee;
        }
        
        /* شريط الماكروز الذكي */
        .macro-tracker {
            display: flex; justify-content: space-around; background: #2d3436; color: #fff;
            padding: 12px; border-radius: 15px; margin: 15px 5%; font-size: 0.8rem;
        }
        .macro-item span { display: block; color: var(--brand); font-weight: 900; font-size: 1rem; }

        /* المنيو */
        .container { padding: 0 5% 120px; }
        .section-title { font-weight: 900; font-size: 1.4rem; margin: 25px 0 15px; }

        .meal-card {
            background: var(--white); border-radius: 25px; margin-bottom: 20px;
            overflow: hidden; border: 1px solid #eee; position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
        }
        .meal-img { width: 100%; height: 200px; object-fit: cover; }
        .meal-body { padding: 20px; }
        .badge { background: #fdf2d2; color: #996e00; padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; margin-left: 5px; }

        .price-tag { font-weight: 900; color: var(--brand); font-size: 1.2rem; }
        
        /* شريط الخيارات (الحساسية) */
        .allergy-chips { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 10px; }
        .chip { padding: 8px 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
        .chip.selected { background: #e74c3c; color: #fff; border-color: #e74c3c; }

        .add-btn {
            position: absolute; top: 15px; left: 15px; background: var(--brand);
            width: 45px; height: 45px; border-radius: 15px; display: flex;
            align-items: center; justify-content: center; cursor: pointer; color: #000; font-weight: 900;
        }

        /* شريط الواتساب السفلي */
        .floating-footer {
            position: fixed; bottom: 0; width: 100%; background: var(--white);
            padding: 20px 8%; border-top: 1px solid #eee; display: flex;
            justify-content: space-between; align-items: center; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="onboarding">
        <div class="step active" id="step1">
            <h1 style="font-size: 2.5rem; color: var(--brand);">FIT<span>FUEL</span></h1>
            <h2>ما هو هدفك الصحي؟</h2>
            <div class="btn-next" onclick="nextStep(2)">خسارة وزن 📉</div>
            <div class="btn-next" onclick="nextStep(2)">بناء عضلات 💪</div>
            <div class="btn-next" onclick="nextStep(2)">نمط حياة صحي ✨</div>
        </div>

        <div class="step" id="step2">
            <h2>هل تعاني من حساسية؟</h2>
            <p>اختر المكونات التي تود استبعادها:</p>
            <div class="allergy-chips">
                <div class="chip" onclick="this.classList.toggle('selected')">المكسرات</div>
                <div class="chip" onclick="this.classList.toggle('selected')">اللاكتوز</div>
                <div class="chip" onclick="this.classList.toggle('selected')">الغلوتين</div>
                <div class="chip" onclick="this.classList.toggle('selected')">البيض</div>
            </div>
            <button class="btn-next" onclick="finishOnboarding()">عرض المنيو المخصص لي</button>
        </div>
    </div>

    <header>
        <div style="font-weight: 900; font-size: 1.1rem;">أهلاً بك، تم تخصيص المنيو لـ هدفك</div>
    </header>

    <div class="macro-tracker">
        <div class="macro-item">السعرات<span id="totalCals">0</span></div>
        <div class="macro-item">بروتين<span id="totalProt">0g</span></div>
        <div class="macro-item">كارب<span id="totalCarb">0g</span></div>
    </div>

    <div class="container">
        <div class="section-title">الأكثر طلباً 🔥</div>
        <div id="mealsContainer"></div>
        
        <div class="section-title">السلطات والمقبلات 🥗</div>
        <div id="saladsContainer"></div>
    </div>

    <div class="floating-footer">
        <div>
            <div style="font-size: 0.8rem; color: #888;">الإجمالي التقديري</div>
            <div style="font-size: 1.5rem; font-weight: 900;" id="finalPrice">0 ريال</div>
        </div>
        <button class="btn-next" style="width: auto; margin: 0; padding: 15px 40px;" onclick="orderNow()">اشترك الآن</button>
    </div>

    <script>
        const meals = [
            { id: 1, type: 'main', name: "سلمون نرويجي مع أرز ليمون", cals: 420, prot: 38, carb: 35, price: 65, img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=500" },
            { id: 2, type: 'main', name: "صدور دجاج بالكريمة الخفيفة", cals: 380, prot: 45, carb: 20, price: 55, img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=500" },
            { id: 3, type: 'salad', name: "سلطة التونة والذرة", cals: 250, prot: 25, carb: 15, price: 40, img: "https://images.unsplash.com/photo-1540420773420-3366772f4999?w=500" },
            { id: 4, type: 'salad', name: "سلطة فاصوليا حمراء", cals: 180, prot: 8, carb: 30, price: 35, img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=500" }
        ];

        let cart = [];

        function nextStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
        }

        function finishOnboarding() {
            document.getElementById('onboarding').style.display = 'none';
            render();
        }

        function render() {
            const mainCont = document.getElementById('mealsContainer');
            const saladCont = document.getElementById('saladsContainer');
            mainCont.innerHTML = ''; saladCont.innerHTML = '';

            meals.forEach(m => {
                const html = `
                    <div class="meal-card">
                        <div class="add-btn" onclick="addToCart(${m.id})">${cart.includes(m.id) ? '✓' : '+'}</div>
                        <img src="${m.img}" class="meal-img">
                        <div class="meal-body">
                            <span class="badge">مناسب لهدفك</span>
                            <h3 style="margin: 10px 0;">${m.name}</h3>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div style="font-size: 0.85rem; color: #666;">${m.cals} سعرة | ${m.prot}g بروتين</div>
                                <div class="price-tag">${m.price} ريال</div>
                            </div>
                        </div>
                    </div>
                `;
                if(m.type === 'main') mainCont.innerHTML += html;
                else saladCont.innerHTML += html;
            });
            updateMacros();
        }

        function addToCart(id) {
            if(cart.includes(id)) cart = cart.filter(itemId => itemId !== id);
            else cart.push(id);
            render();
        }

        function updateMacros() {
            let cals = 0, prot = 0, carb = 0, price = 0;
            meals.forEach(m => {
                if(cart.includes(m.id)) {
                    cals += m.cals; prot += m.prot; carb += m.carb; price += m.price;
                }
            });
            document.getElementById('totalCals').innerText = cals;
            document.getElementById('totalProt').innerText = prot + 'g';
            document.getElementById('totalCarb').innerText = carb + 'g';
            document.getElementById('finalPrice').innerText = price + ' ريال';
        }

        function orderNow() {
            if(cart.length === 0) return alert("اختر وجباتك لبدء الاشتراك");
            const names = meals.filter(m => cart.includes(m.id)).map(m => m.name);
            const msg = `مرحباً Fit Fuel، أود الاشتراك في المنيو المخصص:%0A- ${names.join('%0A- ')}%0Aالإجمالي: ${document.getElementById('finalPrice').innerText}`;
            window.open(`https://wa.me/966563683212?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
