<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Fuel Elite | نظام الطلب المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@100;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #111; --white: #fff; }
        * { box-sizing: border-box; transition: 0.3s ease; }
        body { font-family: 'Noto Kufi Arabic', sans-serif; margin: 0; background: var(--bg); color: var(--white); overflow-x: hidden; }

        header { background: rgba(0,0,0,0.95); padding: 20px 8%; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--gold); }

        .container { padding: 40px 8% 150px; }
        .section-title { font-size: 2.2rem; font-weight: 900; margin: 60px 0 30px; text-align: right; color: var(--gold); border-right: 5px solid var(--gold); padding-right: 15px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        
        .card { background: var(--card); border-radius: 30px; overflow: hidden; border: 1px solid #222; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); }
        
        .img-box { height: 220px; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        
        .card-body { padding: 25px; }
        .card-body h3 { margin: 0 0 10px; font-size: 1.5rem; }

        /* ستايل مخصص للعروض الفردية (الجرامات) */
        .customizer { background: #181818; padding: 15px; border-radius: 20px; margin-top: 15px; border: 1px solid #333; }
        .customizer label { display: block; font-size: 0.8rem; color: var(--gold); margin-bottom: 8px; font-weight: 700; }
        
        .gram-group { display: flex; gap: 5px; margin-bottom: 15px; }
        .g-btn { flex: 1; background: transparent; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 10px; font-size: 0.7rem; cursor: pointer; }
        .g-btn.active { background: var(--gold); color: #000; font-weight: 900; border-color: var(--gold); }

        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #222; }
        .price { font-size: 1.5rem; font-weight: 900; color: var(--gold); }

        .btn-order { background: var(--gold); color: #000; padding: 12px 30px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; width: 100%; }
        
        /* شريط الطلب السفلي */
        .floating-footer { position: fixed; bottom: 0; width: 100%; background: #000; padding: 20px 8%; border-top: 2px solid var(--gold); z-index: 2000; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <header>
        <div class="logo">FIT<span>FUEL</span> ELITE</div>
        <div style="font-weight: 700;">0563683212</div>
    </header>

    <div class="container">
        
        <h2 class="section-title">صمم وجبتك الفردية الآن</h2>
        <div class="grid">
            
            <div class="card">
                <div class="img-box"><img src="https://images.unsplash.com/photo-1544025162-d76694265947?w=600"></div>
                <div class="card-body">
                    <h3>وجبة الأداء (ستيك)</h3>
                    <p style="font-size: 0.8rem; color: #888;">اختر جراماتك المفضلة لبناء وجبتك المتكاملة:</p>
                    
                    <div class="customizer">
                        <label>كمية البروتين (ستيك):</label>
                        <div class="gram-group">
                            <button class="g-btn active" onclick="sel(this, 'p1', '150g')">150g</button>
                            <button class="g-btn" onclick="sel(this, 'p1', '200g')">200g</button>
                            <button class="g-btn" onclick="sel(this, 'p1', '250g')">250g</button>
                        </div>

                        <label>كمية الكارب (أرز/بطاطس):</label>
                        <div class="gram-group">
                            <button class="g-btn active" onclick="sel(this, 'c1', '100g')">100g</button>
                            <button class="g-btn" onclick="sel(this, 'c1', '150g')">150g</button>
                            <button class="g-btn" onclick="sel(this, 'c1', '200g')">200g</button>
                        </div>
                    </div>
                    
                    <div class="price-row">
                        <span class="price">75 ريال</span>
                        <button class="btn-order" onclick="sendCustom('ستيك الأداء')">اطلب الآن</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="img-box"><img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=600"></div>
                <div class="card-body">
                    <h3>وجبة الرشاقة (دجاج)</h3>
                    <p style="font-size: 0.8rem; color: #888;">وجبة خفيفة ومحسوبة بدقة لموازنة يومك:</p>
                    
                    <div class="customizer">
                        <label>كمية البروتين (دجاج):</label>
                        <div class="gram-group">
                            <button class="g-btn active" onclick="sel(this, 'p2', '150g')">150g</button>
                            <button class="g-btn" onclick="sel(this, 'p2', '200g')">200g</button>
                            <button class="g-btn" onclick="sel(this, 'p2', '250g')">250g</button>
                        </div>

                        <label>كمية الكارب (أرز/بطاطس):</label>
                        <div class="gram-group">
                            <button class="g-btn active" onclick="sel(this, 'c2', '100g')">100g</button>
                            <button class="g-btn" onclick="sel(this, 'c2', '150g')">150g</button>
                            <button class="g-btn" onclick="sel(this, 'c2', '200g')">200g</button>
                        </div>
                    </div>

                    <div class="price-row">
                        <span class="price">55 ريال</span>
                        <button class="btn-order" onclick="sendCustom('دجاج الرشاقة')">اطلب الآن</button>
                    </div>
                </div>
            </div>

        </div>

        <h2 class="section-title">الاشتراكات الشهرية</h2>
        <div class="grid">
            <div class="card">
                <div class="img-box"><img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600"></div>
                <div class="card-body">
                    <h3>باقة الرشاقة الكاملة</h3>
                    <p style="font-size: 0.8rem; color: #888;">24 يوم - 3 وجبات يومياً مع الماكروز.</p>
                    <div class="price-row">
                        <span class="price">1,750 ريال</span>
                        <button class="btn-order" onclick="orderPkg('باقة الرشاقة')">اشترك</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let choices = {};

        function sel(btn, group, val) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.g-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            choices[group] = val;
        }

        function sendCustom(mealName) {
            let msg = `طلب وجبة فردية مخصصة: *${mealName}*%0A`;
            msg += `البروتين: ${choices['p1'] || choices['p2'] || '150g'}%0A`;
            msg += `الكارب: ${choices['c1'] || choices['c2'] || '100g'}`;
            window.open(`https://wa.me/966563683212?text=${msg}`, '_blank');
        }

        function orderPkg(name) {
            window.open(`https://wa.me/966563683212?text=أود الاشتراك في ${name}`, '_blank');
        }
    </script>
</body>
</html>
