<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Fuel Elite | التجربة الكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #050505; --white: #ffffff; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Noto Kufi Arabic', sans-serif; margin: 0; background: var(--black); color: var(--white); overflow-x: hidden; }

        /* حاسبة السعرات الجانبية */
        #side-calc {
            position: fixed; left: -320px; top: 15%; width: 300px;
            background: rgba(15, 15, 15, 0.95); border: 1px solid var(--gold);
            border-radius: 0 30px 30px 0; padding: 25px; z-index: 2000;
            backdrop-filter: blur(15px);
        }
        #side-calc.open { left: 0; }
        .calc-toggle {
            position: absolute; right: -55px; top: 20px; background: var(--gold);
            width: 55px; height: 55px; border-radius: 0 15px 15px 0;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 24px; color: black;
        }

        /* قسم الهيرو (الفيديو) */
        .hero-section {
            position: relative; height: 75vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        #hero-video {
            position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%); z-index: -1; filter: brightness(0.4);
        }

        /* شبكة الباقات */
        .plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 80px 8%; }
        .plan-card {
            height: 450px; border-radius: 40px; overflow: hidden; position: relative;
            cursor: pointer; border: 1px solid #222;
        }
        .plan-card img { width: 100%; height: 100%; object-fit: cover; }
        .plan-overlay {
            position: absolute; inset: 0; background: linear-gradient(to top, black, transparent);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 35px;
        }

        /* النافذة المنبثقة (المودال) */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .modal-content {
            background: #111; width: 90%; max-width: 550px; height: 80vh;
            border-radius: 35px; padding: 30px; border: 1px solid #333; overflow-y: auto;
        }
        .meal-item {
            display: flex; align-items: center; background: #1a1a1a; padding: 15px;
            border-radius: 20px; margin-bottom: 12px; cursor: pointer;
        }
        .meal-item img { width: 60px; height: 60px; border-radius: 12px; margin-left: 15px; }
        .close-btn { float: left; font-size: 30px; cursor: pointer; color: var(--gold); }

        .btn-order {
            width: 100%; background: var(--gold); color: black; padding: 18px;
            border-radius: 20px; font-weight: 900; border: none; cursor: pointer; margin-top: 20px;
        }

        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; background: #000; border: 1px solid #333; color: #fff; }
    </style>
</head>
<body>

    <div id="side-calc">
        <div class="calc-toggle" onclick="toggleCalc()">⚖️</div>
        <h3 style="color:var(--gold);">حاسبة النخبة 🧬</h3>
        <input type="number" id="w" placeholder="الوزن (كجم)">
        <input type="number" id="h" placeholder="الطول (سم)">
        <button onclick="calculateBMR()" style="width:100%; background:var(--gold); border:none; padding:10px; border-radius:10px; cursor:pointer; font-weight:bold;">احسب</button>
        <div id="bmr-res" style="margin-top:15px; color:var(--gold); font-size:14px;"></div>
    </div>

    <section class="hero-section">
        <video autoplay muted loop playsinline id="hero-video">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-frying-diced-meat-in-a-pan-close-up-43158-large.mp4" type="video/mp4">
        </video>
        <div>
            <h1 style="font-size: 4rem; margin:0;">FIT <span style="color:var(--gold);">FUEL</span></h1>
            <p>الوجبات الأكثر فخامة في المملكة</p>
        </div>
    </section>

    <div class="plans-grid">
        <div class="plan-card" onclick="openMenu('باقة دايت كير')">
            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600">
            <div class="plan-overlay"><h2>دايت كير</h2><p>2,350 ريال</p></div>
        </div>
        <div class="plan-card" onclick="openMenu('باقة الرشاقة')">
            <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=600">
            <div class="plan-overlay"><h2>الرشاقة الذهبية</h2><p>2,500 ريال</p></div>
        </div>
    </div>

    <div class="modal" id="menuModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeMenu()">&times;</span>
            <h2 id="planTitle" style="color:var(--gold);">المنيو</h2>
            <div id="mealsList"></div>
            <button class="btn-order" onclick="sendToWhatsApp()">تأكيد الطلب عبر واتساب</button>
        </div>
    </div>

    <script>
        const meals = [
            { name: "سلمون مشوي", img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=100" },
            { name: "دجاج بالأعشاب", img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=100" },
            { name: "ستيك أنجوس", img: "https://images.unsplash.com/photo-1544025162-d76694265947?w=100" }
        ];

        let currentPlan = "";

        function toggleCalc() { document.getElementById('side-calc').classList.toggle('open'); }

        function openMenu(name) {
            currentPlan = name;
            document.getElementById('planTitle').innerText = name;
            const list = document.getElementById('mealsList');
            list.innerHTML = meals.map((m, i) => `
                <div class="meal-item" onclick="document.getElementById('m-${i}').checked = !document.getElementById('m-${i}').checked">
                    <img src="${m.img}">
                    <h4 style="flex-grow:1; margin:0;">${m.name}</h4>
                    <input type="checkbox" id="m-${i}" value="${m.name}" style="width:20px;">
                </div>
            `).join('');
            document.getElementById('menuModal').style.display = 'flex';
        }

        function closeMenu() { document.getElementById('menuModal').style.display = 'none'; }

        function calculateBMR() {
            const w = document.getElementById('w').value;
            const h = document.getElementById('h').value;
            if(w && h) {
                let bmi = (w / ((h/100) * (h/100))).toFixed(1);
                document.getElementById('bmr-res').innerText = `كتلة جسمك: ${bmi}`;
            }
        }

        function sendToWhatsApp() {
            const selected = Array.from(document.querySelectorAll('input:checked')).map(el => el.value);
            if(selected.length === 0) return alert("اختر وجبة");
            const msg = `طلب اشتراك: *${currentPlan}*%0Aالمنيو: ${selected.join(', ')}`;
            window.open(`https://wa.me/966563683212?text=${msg}`, '_blank');
        }

        // إغلاق المودال عند الضغط خارجه
        window.onclick = function(event) {
            if (event.target == document.getElementById('menuModal')) closeMenu();
        }
    </script>
</body>
</html>
