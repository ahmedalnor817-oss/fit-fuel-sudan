<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Fuel Elite | المنيو المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #050505; --card-bg: rgba(25, 25, 25, 0.8); --white: #ffffff; }
        
        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        body { font-family: 'Noto Kufi Arabic', sans-serif; margin: 0; background-color: var(--black); color: var(--white); overflow-x: hidden; }

        header {
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        .logo { font-size: 28px; font-weight: 900; color: var(--gold); }

        /* هيرو سينمائي */
        .hero {
            height: 70vh; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        #hero-video {
            position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%); z-index: -2; filter: brightness(0.3);
        }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900; margin: 0; }
        .hero h1 span { color: var(--gold); }

        /* حاسبة السعرات الجانبية */
        #side-calc {
            position: fixed; left: -320px; top: 100px; width: 300px;
            background: var(--card-bg); border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 0 40px 40px 0; padding: 30px; z-index: 2000;
            backdrop-filter: blur(25px); box-shadow: 15px 0 40px rgba(0,0,0,0.6);
        }
        #side-calc.open { left: 0; }
        .calc-toggle {
            position: absolute; right: -60px; top: 20px; background: var(--gold);
            width: 60px; height: 60px; border-radius: 0 20px 20px 0;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 26px; box-shadow: 10px 0 20px rgba(212, 175, 55, 0.2);
        }

        /* الباقات */
        .plans-container { padding: 80px 8%; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .plan-card {
            height: 450px; border-radius: 40px; position: relative; overflow: hidden;
            cursor: pointer; border: 1px solid #1a1a1a;
        }
        .plan-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .plan-content { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 35px; z-index: 2; }

        /* المودال المطور (المنيو الجديد) */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .modal-inner {
            background: #0a0a0a; width: 95%; max-width: 650px; height: 85vh;
            border-radius: 40px; border: 1px solid #333; padding: 30px;
            position: relative; overflow-y: auto;
        }

        /* تبويبات المنيو */
        .menu-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn {
            padding: 10px 25px; border-radius: 50px; border: 1px solid #333;
            background: transparent; color: white; cursor: pointer; white-space: nowrap; font-weight: bold;
        }
        .tab-btn.active { background: var(--gold); color: black; border-color: var(--gold); }

        .meal-item {
            display: flex; align-items: center; background: #151515; padding: 15px;
            border-radius: 25px; margin-bottom: 12px; cursor: pointer; border: 1px solid transparent;
        }
        .meal-item:hover { border-color: var(--gold); transform: scale(1.02); }
        .meal-img { width: 65px; height: 65px; border-radius: 18px; object-fit: cover; margin-left: 15px; }
        
        .btn-wa {
            width: 100%; background: var(--gold); color: black; padding: 18px;
            border-radius: 20px; font-weight: 900; font-size: 18px; border: none;
            cursor: pointer; margin-top: 15px;
        }

        input[type="number"] { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; background: #000; border: 1px solid #222; color: #fff; }
        footer { padding: 40px; text-align: center; opacity: 0.3; }
    </style>
</head>
<body>

    <header>
        <div class="logo">FIT<span>FUEL</span> ELITE</div>
        <div style="font-weight: 700; color: var(--gold);">0563683212</div>
    </header>

    <div id="side-calc">
        <div class="calc-toggle" onclick="toggleCalc()">⚖️</div>
        <h3 style="color:var(--gold); margin-top:0;">حلل جسمك 🧬</h3>
        <input type="number" id="w" placeholder="الوزن (كجم)">
        <input type="number" id="h" placeholder="الطول (سم)">
        <button onclick="calculateBMI()" class="btn-wa" style="padding: 10px;">احسب الآن</button>
        <div id="res" style="margin-top: 15px; color: var(--gold); font-size: 14px;"></div>
    </div>

    <section class="hero">
        <video autoplay muted loop playsinline id="hero-video">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-frying-diced-meat-in-a-pan-close-up-43158-large.mp4" type="video/mp4">
        </video>
        <h1>فخامة <span>التغذية</span></h1>
        <p>نحو حياة صحية متكاملة</p>
    </section>

    <div class="plans-container">
        <div class="plan-card" onclick="openMenu('باقة الرشاقة')">
            <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=600">
            <div class="plan-content"><h2>باقة الرشاقة</h2><p style="color:var(--gold);">2,500 ريال</p></div>
        </div>
        <div class="plan-card" onclick="openMenu('باقة دايت كير')">
            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600">
            <div class="plan-content"><h2>دايت كير</h2><p style="color:var(--gold);">2,350 ريال</p></div>
        </div>
    </div>

    <div class="modal" id="menuModal">
        <div class="modal-inner">
            <span onclick="closeMenu()" style="float: left; cursor: pointer; font-size: 35px; color: var(--gold);">&times;</span>
            <h2 id="pTitle" style="color: var(--gold); margin-top: 0;">المنيو المختار</h2>
            
            <div class="menu-tabs">
                <button class="tab-btn active" onclick="showCategory('main')">الوجبات الرئيسية</button>
                <button class="tab-btn" onclick="showCategory('salads')">السلطات والإضافات</button>
            </div>

            <div id="mList"></div>
            <button class="btn-wa" onclick="sendWA()">تأكيد وإرسال للواتساب</button>
        </div>
    </div>

    <footer>Fit Fuel Elite Saudi Arabia © 2026</footer>

    <script>
        const meals = {
            main: [
                { name: "سلمون نرويجي فاخر", img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=150" },
                { name: "صدور دجاج بالأعشاب", img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=150" },
                { name: "ستيك أنجوس مشوي", img: "https://images.unsplash.com/photo-1544025162-d76694265947?w=150" }
            ],
            salads: [
                { name: "سلطة صدور مع ذرة وخضار", img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=150" },
                { name: "سلطة تونة صحية", img: "https://images.unsplash.com/photo-1540420773420-3366772f4999?w=150" },
                { name: "سلطة فاصوليا حمراء", img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=150" },
                { name: "سلطة ملفوف مع خيار", img: "https://images.unsplash.com/photo-1543332164-6e82f355badc?w=150" },
                { name: "زبادي لايت (إضافة)", img: "https://images.unsplash.com/photo-1488477181946-6428a0291777?w=150" },
                { name: "مايونيز لايت (إضافة)", img: "https://images.unsplash.com/photo-1584281722572-990710609a34?w=150" }
            ]
        };

        let selectedPlan = "";

        function toggleCalc() { document.getElementById('side-calc').classList.toggle('open'); }

        function showCategory(cat) {
            const container = document.getElementById('mList');
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(b => b.classList.remove('active'));
            event?.target.classList.add('active');

            container.innerHTML = meals[cat].map((m, i) => `
                <div class="meal-item" onclick="document.getElementById('${cat}${i}').checked = !document.getElementById('${cat}${i}').checked">
                    <img src="${m.img}" class="meal-img">
                    <h4 style="flex-grow:1; margin:0;">${m.name}</h4>
                    <input type="checkbox" id="${cat}${i}" value="${m.name}" class="meal-check" style="width:22px; height:22px; accent-color:var(--gold);">
                </div>
            `).join('');
        }

        function openMenu(plan) {
            selectedPlan = plan;
            document.getElementById('pTitle').innerText = plan;
            showCategory('main');
            document.getElementById('menuModal').style.display = 'flex';
        }

        function closeMenu() { document.getElementById('menuModal').style.display = 'none'; }

        function sendWA() {
            const items = Array.from(document.querySelectorAll('.meal-check:checked')).map(el => el.value);
            if(items.length === 0) return alert("اختر صنفاً واحداً على الأقل");
            const text = `مرحباً، أود الاشتراك في *${selectedPlan}*%0Aالطلبات المختارة:%0A- ${items.join('%0A- ')}`;
            window.open(`https://wa.me/966563683212?text=${text}`, '_blank');
        }

        function calculateBMI() {
            const w = document.getElementById('w').value;
            const h = document.getElementById('h').value;
            if(w && h) {
                let bmi = (w / ((h/100)*(h/100))).toFixed(1);
                document.getElementById('res').innerText = `كتلة جسمك: ${bmi}`;
            }
        }
    </script>
</body>
</html>
