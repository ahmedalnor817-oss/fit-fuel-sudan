<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Fuel Elite | النسخة المصلحة</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #050505; --card-bg: rgba(20, 20, 20, 0.95); --white: #ffffff; }
        
        * { box-sizing: border-box; transition: all 0.3s ease-in-out; }
        body { font-family: 'Noto Kufi Arabic', sans-serif; margin: 0; background-color: var(--black); color: var(--white); overflow-x: hidden; }

        /* حاسبة السعرات الجانبية المصلحة */
        #side-calc {
            position: fixed; 
            left: -320px; /* مخفية في البداية */
            top: 100px; 
            width: 300px;
            background: var(--card-bg); 
            border: 1px solid var(--gold);
            border-radius: 0 30px 30px 0; 
            padding: 25px; 
            z-index: 2000;
            backdrop-filter: blur(15px); 
            box-shadow: 10px 0 30px rgba(0,0,0,0.8);
        }

        /* عندما يتم إضافة كلاس "open" تظهر الحاسبة */
        #side-calc.open { left: 0; }

        .calc-toggle {
            position: absolute; 
            right: -55px; 
            top: 20px; 
            background: var(--gold);
            width: 55px; 
            height: 55px; 
            border-radius: 0 15px 15px 0;
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer; 
            font-size: 24px; 
            color: black;
            box-shadow: 5px 0 15px rgba(212, 175, 55, 0.3);
        }

        /* تنسيق المدخلات داخل الحاسبة */
        input, select {
            width: 100%; background: #000; border: 1px solid #333;
            color: white; padding: 12px; border-radius: 12px; margin-bottom: 10px;
            font-family: 'Noto Kufi Arabic';
        }

        .btn-calc-action {
            width: 100%; background: var(--gold); border: none; padding: 12px;
            border-radius: 12px; font-weight: bold; cursor: pointer; color: black;
        }

        /* باقي تنسيقات الموقع الأساسية */
        header { padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; background: #050505; border-bottom: 1px solid #222; }
        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle, #1a1a1a, #050505); }
        .plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px 8%; }
        .plan-card { height: 350px; border-radius: 30px; background-size: cover; border: 1px solid #222; cursor: pointer; display: flex; align-items: flex-end; position: relative; overflow: hidden; }
        .plan-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, black, transparent); }
        .plan-info { position: relative; z-index: 2; padding: 25px; }
    </style>
</head>
<body>

    <div id="side-calc">
        <div class="calc-toggle" onclick="toggleCalc()">⚖️</div>
        <h3 style="color:var(--gold); margin-top:0;">حاسبة الرشاقة 🧬</h3>
        <input type="number" id="w" placeholder="الوزن (كجم)">
        <input type="number" id="h" placeholder="الطول (سم)">
        <input type="number" id="a" placeholder="العمر">
        <select id="g">
            <option value="m">ذكر</option>
            <option value="f">أنثى</option>
        </select>
        <button class="btn-calc-action" onclick="calculateBMR()">احسب نتيجتي</button>
        <div id="bmr-res" style="margin-top:15px; font-size:13px; color:var(--gold); display:none; padding:10px; background:rgba(212,175,55,0.1); border-radius:10px;"></div>
        <p onclick="toggleCalc()" style="text-align:center; font-size:11px; margin-top:15px; cursor:pointer; opacity:0.5;">إغلاق الحساب ×</p>
    </div>

    <header>
        <div class="logo" style="font-weight:900; color:var(--gold); font-size:24px;">FIT FUEL ELITE</div>
        <div>0563683212</div>
    </header>

    <section class="hero">
        <h1>صحتك.. <span>بمعايير عالمية</span></h1>
        <p>استخدم الحاسبة الجانبية لمعرفة احتياج جسمك</p>
    </section>

    <div class="plans-grid">
        <div class="plan-card" style="background-image: url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500');">
            <div class="plan-info"><h3>باقة دايت كير</h3><p>2,350 ريال</p></div>
        </div>
        <div class="plan-card" style="background-image: url('https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=500');">
            <div class="plan-info"><h3>باقة الرشاقة</h3><p>2,500 ريال</p></div>
        </div>
    </div>

    <script>
        // وظيفة التبديل (فتح وإغلاق)
        function toggleCalc() {
            const calc = document.getElementById('side-calc');
            calc.classList.toggle('open');
        }

        function calculateBMR() {
            const w = document.getElementById('w').value;
            const h = document.getElementById('h').value;
            const a = document.getElementById('a').value;
            const g = document.getElementById('g').value;
            if(w && h && a) {
                let bmr = (g === 'm') ? (10 * w + 6.25 * h - 5 * a + 5) : (10 * w + 6.25 * h - 5 * a - 161);
                const res = document.getElementById('bmr-res');
                res.style.display = "block";
                res.innerText = `احتياجك اليومي التقريبي هو: ${Math.round(bmr)} سعرة حرارية.`;
            } else {
                alert("الرجاء إدخال كافة البيانات");
            }
        }

        // إغلاق الحاسبة عند الضغط في أي مكان خارجها
        document.addEventListener('click', function(event) {
            const calc = document.getElementById('side-calc');
            const isClickInside = calc.contains(event.target);

            if (!isClickInside && calc.classList.contains('open')) {
                calc.classList.remove('open');
            }
        });
    </script>
</body>
</html>
