<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Fuel Elite | اختيار الوجبات الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --black: #050505;
            --card-bg: #121212;
            --white: #ffffff;
        }

        body {
            font-family: 'Noto Kufi Arabic', sans-serif;
            margin: 0;
            background-color: var(--black);
            color: var(--white);
            overflow-x: hidden;
        }

        header {
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo { font-size: 24px; font-weight: 900; color: var(--gold); }

        /* شبكة الباقات */
        .plans-container {
            padding: 60px 8%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .plan-card {
            height: 400px;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: 0.4s;
            border: 1px solid #222;
            display: flex;
            align-items: flex-end;
            background-size: cover;
            background-position: center;
        }

        .plan-card::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }

        .plan-card:hover { transform: translateY(-10px); border-color: var(--gold); }

        .plan-info { position: relative; z-index: 2; padding: 30px; width: 100%; }

        /* النافذة المنبثقة (Modal) */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            border-radius: 40px;
            padding: 40px;
            position: relative;
            overflow-y: auto;
            border: 1px solid var(--gold);
        }

        .close-modal {
            position: absolute; top: 20px; left: 20px;
            font-size: 30px; color: var(--gold); cursor: pointer;
        }

        .meals-list { margin-top: 20px; }
        .meal-item {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 15px;
            transition: 0.3s;
            cursor: pointer;
        }
        .meal-item:hover { background: #252525; }
        .meal-item input { margin-left: 15px; accent-color: var(--gold); width: 20px; height: 20px; }
        
        .btn-confirm {
            width: 100%;
            background: var(--gold);
            color: black;
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-weight: 900;
            margin-top: 20px;
            cursor: pointer;
        }

        footer { padding: 60px 8%; text-align: center; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <header>
        <div class="logo">FIT<span>FUEL</span> ELITE</div>
        <div style="color: var(--gold); font-weight: bold;">0563683212</div>
    </header>

    <div style="text-align:center; padding: 40px 8% 0;">
        <h1>اختر باقتك ثم <span>حدد وجباتك</span></h1>
        <p style="color:#888;">اضغط على الباقة لاستعراض المنيو المتوفر</p>
    </div>

    <div class="plans-container">
        <div class="plan-card" style="background-image: url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600');" onclick="openMenu('دايت كير (التوازن)')">
            <div class="plan-info">
                <h3>باقة دايت كير</h3>
                <p>2,350 ريال / شهرياً</p>
            </div>
        </div>

        <div class="plan-card" style="background-image: url('https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=600');" onclick="openMenu('الرشاقة الذهبية')">
            <div class="plan-info">
                <h3>باقة الرشاقة</h3>
                <p>2,500 ريال / شهرياً</p>
            </div>
        </div>

        <div class="plan-card" style="background-image: url('https://images.unsplash.com/photo-1532550907401-a500c9a57435?w=600');" onclick="openMenu('الضخامة والأداء')">
            <div class="plan-info">
                <h3>باقة الضخامة</h3>
                <p>3,200 ريال / شهرياً</p>
            </div>
        </div>
    </div>

    <div class="modal" id="menuModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeMenu()">&times;</span>
            <h2 id="selectedPlanTitle">اسم الباقة</h2>
            <p style="color:var(--gold);">اختر الوجبات المفضلة لديك:</p>
            
            <div class="meals-list" id="mealsContainer">
                </div>

            <button class="btn-confirm" onclick="sendToWhatsApp()">تأكيد الاختيار والطلب عبر واتساب</button>
        </div>
    </div>

    <footer>
        <p>© 2026 Fit Fuel Elite - Saudi Arabia</p>
    </footer>

    <script>
        let currentPlan = "";
        
        // قائمة الأصناف (يمكنك تعديل الأسماء هنا)
        const meals = [
            "سلمون مشوي مع أرز بري",
            "صدور دجاج بالليمون والأعشاب",
            "ستيك لحم بصلصة المشروم",
            "مكرونة فوسيلي بالدجاج الصحي",
            "سلطة الكينوا مع الأفوكادو",
            "كفتة دايت مع خضار سوتيه"
        ];

        function openMenu(planName) {
            currentPlan = planName;
            document.getElementById('selectedPlanTitle').innerText = planName;
            const container = document.getElementById('mealsContainer');
            container.innerHTML = "";
            
            meals.forEach((meal, index) => {
                container.innerHTML += `
                    <div class="meal-item" onclick="toggleCheckbox(${index})">
                        <input type="checkbox" id="meal-${index}" value="${meal}">
                        <span>${meal}</span>
                    </div>
                `;
            });
            
            document.getElementById('menuModal').style.display = 'flex';
        }

        function toggleCheckbox(index) {
            const cb = document.getElementById(`meal-${index}`);
            cb.checked = !cb.checked;
        }

        function closeMenu() {
            document.getElementById('menuModal').style.display = 'none';
        }

        function sendToWhatsApp() {
            const selected = [];
            const checkboxes = document.querySelectorAll('.meals-list input:checked');
            checkboxes.forEach(cb => selected.push(cb.value));

            if(selected.length === 0) {
                alert("لطفاً، اختر وجبة واحدة على الأقل.");
                return;
            }

            const message = `مرحباً Fit Fuel Elite،%0A%0Aأود الاشتراك في: *${currentPlan}*%0Aالوجبات المختارة:%0A- ${selected.join('%0A- ')}%0A%0Aأرجو التواصل معي لإتمام الحجز.`;
            const whatsappURL = `https://wa.me/966563683212?text=${message}`;
            
            window.open(whatsappURL, '_blank');
        }

        // إغلاق النافذة عند الضغط خارجها
        window.onclick = function(event) {
            const modal = document.getElementById('menuModal');
            if (event.target == modal) closeMenu();
        }
    </script>
</body>
</html>
