<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diet Programs</title>

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: #f8f8f8;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    background: white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.logo {
    font-weight: bold;
    font-size: 22px;
    color: #27ae60;
}

/* Hero */
.hero {
    background: linear-gradient(to right, #27ae60, #2ecc71);
    color: white;
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 40px;
}

/* Programs */
.programs {
    padding: 50px 20px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-10px);
}

.card h3 {
    color: #27ae60;
}

/* Button */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 15px;
    background: #27ae60;
    color: white;
    border-radius: 8px;
    text-decoration: none;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">Diet</div>
    <div>Programs</div>
</div>

<!-- Hero -->
<div class="hero">
    <h1>برامج الدايت الصحية</h1>
    <p>اختار البرنامج المناسب لهدفك</p>
</div>

<!-- Programs -->
<div class="programs">
    <div class="cards">

        <div class="card">
            <h3>وازن</h3>
            <p>نظام متوازن 1500 سعرة</p>
            <a href="#" class="btn">عرض</a>
        </div>

        <div class="card">
            <h3>بروتين عالي</h3>
            <p>لبناء العضلات</p>
            <a href="#" class="btn">عرض</a>
        </div>

        <div class="card">
            <h3>كيتو</h3>
            <p>حرق الدهون</p>
            <a href="#" class="btn">عرض</a>
        </div>

        <div class="card">
            <h3>جو فلات</h3>
            <p>خطة 20 يوم</p>
            <a href="#" class="btn">عرض</a>
        </div>

    </div>
</div>

</body>
</html>
