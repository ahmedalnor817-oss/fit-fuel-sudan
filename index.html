<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Fuel Elite | المنيو الحر</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #050505; --card-bg: #111; --white: #ffffff; }
        
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Noto Kufi Arabic', sans-serif; margin: 0; background-color: var(--black); color: var(--white); scroll-behavior: smooth; }

        header {
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(10px);
            position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #222;
        }
        .logo { font-size: 24px; font-weight: 900; color: var(--gold); }

        /* قسم الهيرو */
        .hero {
            padding: 150px 8% 50px; text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin: 0; }
        .hero span { color: var(--gold); }

        /* فلتر التصنيفات */
        .categories {
            display: flex; justify-content: center; gap: 15px; padding: 30px 8%;
            position: sticky; top: 80px; z-index: 900; background: var(--black);
        }
        .cat-btn {
            padding: 10px 25px; border-radius: 50px; border: 1px solid #333;
            background: transparent; color: white; cursor: pointer; font-weight: bold;
        }
        .cat-btn.active { background: var(--gold); color: black; border-color: var(--gold); }

        /* شبكة الأصناف */
        .items-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; padding: 20px 8% 120px;
        }

        .item-card {
            background: var(--card-bg); border-radius: 30px; overflow: hidden;
            border: 1px solid #222; position: relative; cursor: pointer;
        }
        .item-card:hover { border-color: var(--gold); transform: translateY(-10px); }
        .item-card img { width: 100%; height: 220px; object-fit: cover; }
        
        .item-info { padding: 20px; text-align: center; }
        .item-info h3 { margin: 0 0 10px; font-size: 18px; }

        /* شريط الطلب السفلي */
        .order-bar {
            position: fixed; bottom: 0; width: 100%; background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px); padding: 20px 8%; border-top: 1px solid var(--gold);
            display: flex; justify-content: space-between; align-items: center; z-index: 2000;
            transform: translateY(100%); transition: 0.5s;
        }
        .order-bar.show { transform: translateY(0); }

        .btn-send {
            background: var(--gold); color: black; padding: 15px 40px;
            border-radius: 50px; font-weight: 900; border: none; cursor: pointer;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        /* حاسبة جانبية مبسطة */
        .side-tool {
            position: fixed; left: 20px; bottom: 100px; z-index: 1000;
        }
        .tool-icon {
            width: 50px; height: 50px; background: var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px;
        }

        /* الـ Checkbox المخفي */
        .select-check {
            position: absolute; top: 15px; right: 15px; width: 30px; height: 30px;
            accent-color: var(--gold); transform: scale(1.5); cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">FIT<span>FUEL</span> ELITE</div>
        <div style="font-size: 14px; opacity: 0.8;">اختر وجباتك المفضلة مباشرة</div>
    </header>

    <section class="hero">
        <h1>صمم <span>منيو أسبوعك</span> بحرية</h1>
        <p>لا قيود بعد اليوم.. اختر كل صنف تريده وسنقوم بتجهيزه لك</p>
    </section>

    <div class="categories">
        <button class="cat-btn active" onclick="filterItems('all')">الكل</button>
        <button class="cat-btn" onclick="filterItems('main')">الوجبات الرئيسية</button>
        <button class="cat-btn" onclick="filterItems('salad')">السلطات والإضافات</button>
    </div>

    <div class="items-grid" id="menuGrid">
        </div>

    <div class="order-bar" id="orderBar">
        <div>
            <span id="selectedCount" style="font-weight: 900; color: var(--gold); font-size: 20px;">0</span> صنف مختار
        </div>
        <button class="btn-send" onclick="sendToWhatsApp()">أرسل الطلب للواتساب</button>
    </div>

    <script>
        const allItems = [
            // وجبات رئيسية
            { id: 1, name: "سلمون نرويجي فاخر", cat: "main", img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=400" },
            { id: 2, name: "صدور دجاج بالأعشاب", cat: "main", img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=400" },
            { id: 3, name: "ستيك أنجوس مشوي", cat: "main", img: "https://images.unsplash.com/photo-1544025162-d76694265947?w=400" },
            { id: 4, name: "روبيان جامبو دايت", cat: "main", img: "https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=400" },
            
            // سلطات وإضافات
            { id: 5, name: "سلطة صدور مع ذرة وخضار", cat: "salad", img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400" },
            { id: 6, name: "سلطة تونة صحية", cat: "salad", img: "https://images.unsplash.com/photo-1540420773420-3366772f4999?w=400" },
            { id: 7, name: "سلطة فاصوليا حمراء", cat: "salad", img: "https://images.unsplash.com/photo-1543332164-6e82f355badc?w=400" },
            { id: 8, name: "سلطة ملفوف مع خيار", cat: "salad", img: "https://images.unsplash.com/photo-1546793665-c74683c3f90d?w=400" },
            { id: 9, name: "زبادي لايت", cat: "salad", img: "https://images.unsplash.com/photo-1488477181946-6428a0291777?w=400" },
            { id: 10, name: "مايونيز لايت", cat: "salad", img: "https://images.unsplash.com/photo-1584281722572-990710609a34?w=400" }
        ];

        let selectedItems = new Set();

        function renderItems(filter = 'all') {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';
            
            const filtered = filter === 'all' ? allItems : allItems.filter(i => i.cat === filter);

            filtered.forEach(item => {
                const isSelected = selectedItems.has(item.name);
                grid.innerHTML += `
                    <div class="item-card" onclick="toggleSelection('${item.name}')" style="${isSelected ? 'border-color:var(--gold)' : ''}">
                        <input type="checkbox" class="select-check" ${isSelected ? 'checked' : ''}>
                        <img src="${item.img}">
                        <div class="item-info">
                            <h3>${item.name}</h3>
                        </div>
                    </div>
                `;
            });
        }

        function toggleSelection(name) {
            if (selectedItems.has(name)) {
                selectedItems.delete(name);
            } else {
                selectedItems.add(name);
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('selectedCount').innerText = selectedItems.size;
            const bar = document.getElementById('orderBar');
            if (selectedItems.size > 0) {
                bar.classList.add('show');
            } else {
                bar.classList.remove('show');
            }
            renderItems(window.currentCat || 'all');
        }

        function filterItems(cat) {
            window.currentCat = cat;
            const btns = document.querySelectorAll('.cat-btn');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderItems(cat);
        }

        function sendToWhatsApp() {
            const list = Array.from(selectedItems).join('%0A- ');
            const text = `مرحباً Fit Fuel، أود طلب الأصناف التالية من المنيو الحر:%0A- ${list}`;
            window.open(`https://wa.me/966563683212?text=${text}`, '_blank');
        }

        // تشغيل المنيو عند التحميل
        renderItems();
    </script>
</body>
</html>
