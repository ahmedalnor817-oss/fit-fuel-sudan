<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Fuel Elite | تجربة النخبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --black: #050505;
            --card-bg: #121212;
            --white: #ffffff;
        }

        body {
            font-family: 'Noto Kufi Arabic', sans-serif;
            margin: 0; background-color: var(--black); color: var(--white);
            overflow-x: hidden;
        }

        header {
            padding: 15px 8%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1a1a1a;
        }

        .logo { font-size: 24px; font-weight: 900; color: var(--gold); }

        /* قسم الهيرو الجديد بالصورة المرفقة */
        .hero-section {
            height: 70vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), var(--black)), 
                        url('https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=1200'); /* هنا يتم وضع صورتك المرفقة */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
        }

        .hero-section h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 10px; }
        .hero-section span { color: var(--gold); }

        /* البطاقات الرئيسية */
        .plans-container {
            padding: 40px 8%; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;
        }

        .plan-card {
            height: 350px; border-radius: 30px; position: relative; overflow: hidden;
            cursor: pointer; transition: 0.4s; border: 1px solid #222;
            display: flex; align-items: flex-end; background-size: cover; background-position: center;
        }

        .plan-card::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }

        .plan-card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .plan-info { position: relative; z-index: 2; padding: 25px; width: 100%; }

        /* Modal Styles */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            justify-content: center; align-items: center; z-index: 2000;
        }

        .modal-content {
            background: var(--card-bg); width: 90%; max-width: 500px;
            max-height: 80vh; border-radius: 30px; padding: 25px;
            position: relative; overflow-y: auto; border: 1px solid #333;
        }

        .close-modal { position: absolute; top: 15px; left: 20px; font-size: 30px; color: var(--gold); cursor: pointer; }

        .meal-item {
            display: flex; align-items: center; background: #1a1a1a;
            padding: 10px; margin-bottom: 12px; border-radius: 18px;
            cursor: pointer; border: 1px solid transparent; transition: 0.3s;
        }

        .meal-item:hover { border-color: var(--gold); }
        .meal-img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; margin-left: 15px; }
        .meal-text { flex-grow: 1; }
        .meal-text h4 { margin: 0; font-size: 14px; }
        .meal-item input { accent-color: var(--gold); width: 18px; height: 18px; }

        .btn-confirm {
            width: 100%; background: var(--gold); color: black; padding: 14px;
            border-radius: 15px; border: none; font-weight: 900; margin-top: 15px; cursor: pointer;
        }

        footer { padding: 30px; text-align: center; opacity: 0.4; font-size: 11px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">FIT<span>FUEL</span> ELITE</div>
        <div style="color:var(--gold); font-size: 13px;">0563683212</div>
    </header>

    <section class="hero-section">
        <h1>صمم <span>جسمك</span> بذكاء</h1>
        <p>اختر باقتك وحدد وجباتك المفضلة من المنيو الفاخر</p>
    </section>

    <div class="plans-container">
        <div class="plan-card" style="background-image: url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600');" onclick="openMenu('باقة دايت كير')">
            <div class="plan-info"><h3>باقة دايت كير</h3><p>التوازن المثالي للصحة</p></div>
        </div>
        <div class="plan-card" style="background-image: url('https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=600');" onclick="openMenu('باقة الرشاقة')">
            <div class="plan-info"><h3>باقة الرشاقة</h3><p>لحرق الدهون بذكاء</p></div>
        </div>
        <div class="plan-card" style="background-image: url('https://images.unsplash.com/photo-1532550907401-a500c9a57435?w=600');" onclick="openMenu('باقة الضخامة')">
            <div class="plan-info"><h3>باقة الضخامة</h3><p>للأداء العضلي الأقصى</p></div>
        </div>
    </div>

    <div class="modal" id="menuModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeMenu()">&times;</span>
            <h2 id="planTitle" style="color:var(--gold);">قائمة الوجبات</h2>
            <div id="mealsList"></div>
            <button class="btn-confirm" onclick="sendToWhatsApp()">إرسال الطلب عبر الواتساب</button>
        </div>
    </div>

    <footer>© 2026 Fit Fuel Elite Saudi Arabia</footer>

    <script>
        let currentPlan = "";
        const meals = [
            { name: "سلمون مشوي نرويجي", img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=100" },
            { name: "صدور دجاج بالأعشاب", img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=100" },
            { name: "ستيك لحم بصلصة المشروم", img: "https://images.unsplash.com/photo-1544025162-d76694265947?w=100" },
            { name: "سلطة كينوا بالأفوكادو", img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=100" },
            { name: "جمبري مشوي دايت", img: "https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=100" }
        ];

        function openMenu(name) {
            currentPlan = name;
            document.getElementById('planTitle').innerText = name;
            const container = document.getElementById('mealsList');
            container.innerHTML = meals.map((m, i) => `
                <div class="meal-item" onclick="document.getElementById('m-${i}').checked = !document.getElementById('m-${i}').checked">
                    <img src="${m.img}" class="meal-img">
                    <div class="meal-text"><h4>${m.name}</h4></div>
                    <input type="checkbox" id="m-${i}" value="${m.name}">
                </div>
            `).join('');
            document.getElementById('menuModal').style.display = 'flex';
        }

        function closeMenu() { document.getElementById('menuModal').style.display = 'none'; }

        function sendToWhatsApp() {
            const selected = Array.from(document.querySelectorAll('input:checked')).map(el => el.value);
            if(selected.length === 0) return alert("اختر صنفاً واحداً");
            const msg = `مرحباً، أود الاشتراك في: *${currentPlan}*%0Aالأصناف:%0A- ${selected.join('%0A- ')}`;
            window.open(`https://wa.me/966563683212?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
