<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Fuel Elite | تجربة كالو</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-gold: #d4af37; --bg-gray: #f8f9fa; --dark-text: #1a1a1a; --card-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Kufi Arabic', sans-serif; margin: 0; background-color: var(--bg-gray); color: var(--dark-text); }

        /* الشاشة الافتتاحية (كالو ستايل) */
        #onboarding {
            position: fixed; inset: 0; background: #fff; z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .onboard-card { text-align: center; max-width: 400px; }
        .onboard-card h1 { font-size: 2rem; color: var(--main-gold); margin-bottom: 10px; }
        .btn-start { background: var(--dark-text); color: #fff; padding: 15px 60px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; width: 100%; font-size: 1.1rem; }

        /* الواجهة الرئيسية */
        header {
            background: #fff; padding: 15px 5%; display: flex; justify-content: space-between;
            align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee;
        }
        .user-stats { background: #f0f0f0; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: 700; }

        .container { padding: 20px 5%; max-width: 1200px; margin: 0 auto; }

        /* عرض المنيو اليومي */
        .day-selector { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0 20px; scrollbar-width: none; }
        .day-item { 
            min-width: 60px; padding: 10px; background: #fff; border-radius: 15px; 
            text-align: center; border: 1px solid #eee; cursor: pointer;
        }
        .day-item.active { background: var(--main-gold); border-color: var(--main-gold); color: #fff; }

        /* بطاقات الوجبات (Calo Design) */
        .meal-card {
            background: #fff; border-radius: 25px; overflow: hidden; margin-bottom: 25px;
            box-shadow: var(--card-shadow); border: 1px solid #f0f0f0; position: relative;
        }
        .meal-img { width: 100%; height: 250px; object-fit: cover; }
        .meal-info { padding: 20px; }
        .meal-tags { display: flex; gap: 8px; margin-bottom: 10px; }
        .tag { font-size: 0.75rem; padding: 4px 10px; border-radius: 8px; background: #fef9e7; color: #b7950b; font-weight: 700; }
        
        .meal-macros { 
            display: flex; justify-content: space-between; border-top: 1px solid #f5f5f5; 
            padding-top: 15px; margin-top: 15px; font-size: 0.85rem; color: #666;
        }
        .macro-val { font-weight: 900; color: var(--dark-text); display: block; font-size: 1rem; }

        .select-btn {
            position: absolute; top: 15px; left: 15px; background: #fff;
            width: 40px; height: 40px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer; font-size: 1.2rem;
        }
        .select-btn.checked { background: #27ae60; color: #fff; }

        /* شريط الطلب السفلي المستوحى من كالو */
        .bottom-checkout {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #fff;
            padding: 20px 5%; border-top: 1px solid #eee; display: flex;
            justify-content: space-between; align-items: center; z-index: 2000;
        }
        .price-box { font-size: 0.8rem; color: #888; }
        .total-price { display: block; font-size: 1.4rem; font-weight: 900; color: var(--dark-text); }
        .confirm-btn { background: var(--main-gold); color: #000; padding: 15px 40px; border-radius: 18px; font-weight: 900; border: none; cursor: pointer; }

        /* الحاسبة المنبثقة */
        #calc-popup {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 80vh;
            background: #fff; border-radius: 30px 30px 0 0; z-index: 4000;
            padding: 40px 10%; transition: 0.5s ease-out; box-shadow: 0 -20px 40px rgba(0,0,0,0.1);
        }
        #calc-popup.show { bottom: 0; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #eee; background: #f9f9f9; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="onboarding">
        <div class="onboard-card">
            <h1>FIT<span>FUEL</span></h1>
            <p>أهلاً بك في عالم التغذية الذكية. دعنا نصمم منيو يناسب أهدافك.</p>
            <button class="btn-start" onclick="showCalc()">ابدأ الآن</button>
        </div>
    </div>

    <div id="calc-popup">
        <h2>أخبرنا عنك 🥗</h2>
        <input type="number" id="weight" placeholder="الوزن الحالي (كجم)">
        <input type="number" id="height" placeholder="الطول (سم)">
        <p style="font-size: 0.9rem; color: #666;">سنقوم بحساب احتياجك واقتراح أفضل الوجبات لك.</p>
        <button class="btn-start" style="background: var(--main-gold); color: #000;" onclick="finishOnboarding()">عرض المنيو الخاص بي</button>
    </div>

    <header>
        <div style="font-weight: 900; font-size: 1.2rem;">استكشف المنيو</div>
        <div class="user-stats" id="userCals">2400 سعرة</div>
    </header>

    <div class="container">
        <div class="day-selector">
            <div class="day-item active">السبت</div>
            <div class="day-item">الأحد</div>
            <div class="day-item">الاثنين</div>
            <div class="day-item">الثلاثاء</div>
            <div class="day-item">الأربعاء</div>
        </div>

        <div id="mealsGrid">
            </div>
    </div>

    <div class="bottom-checkout" id="checkout">
        <div class="price-box">
            السعر التقريبي
            <span class="total-price" id="totalPrice">0 ريال</span>
        </div>
        <button class="confirm-btn" onclick="sendToWhatsApp()">اشترك الآن</button>
    </div>

    <script>
        const meals = [
            { name: "سلمون مع أرز بري", cals: 450, protein: "35g", carbs: "40g", fat: "12g", img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=500", price: 65 },
            { name: "دجاج بيري بيري", cals: 380, protein: "42g", carbs: "30g", fat: "8g", img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=500", price: 55 },
            { name: "سلطة كينوا مكسيكية", cals: 290, protein: "12g", carbs: "45g", fat: "10g", img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=500", price: 40 },
            { name: "ستيك بصلصة المشروم", cals: 520, protein: "45g", carbs: "20g", fat: "25g", img: "https://images.unsplash.com/photo-1544025162-d76694265947?w=500", price: 85 }
        ];

        let selected = new Set();
        let total = 0;

        function showCalc() {
            document.getElementById('calc-popup').classList.add('show');
        }

        function finishOnboarding() {
            const w = document.getElementById('weight').value;
            if(!w) return alert("فضلاً أدخل وزنك");
            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('calc-popup').classList.remove('show');
            renderMeals();
        }

        function renderMeals() {
            const grid = document.getElementById('mealsGrid');
            grid.innerHTML = meals.map(m => `
                <div class="meal-card">
                    <div class="select-btn ${selected.has(m.name) ? 'checked' : ''}" onclick="toggleMeal('${m.name}', ${m.price})">
                        ${selected.has(m.name) ? '✓' : '+'}
                    </div>
                    <img src="${m.img}" class="meal-img">
                    <div class="meal-info">
                        <div class="meal-tags"><span class="tag">عالي البروتين</span><span class="tag">صحي</span></div>
                        <h3 style="margin:0;">${m.name}</h3>
                        <div class="meal-macros">
                            <div><span class="macro-val">${m.cals}</span>سعرة</div>
                            <div><span class="macro-val">${m.protein}</span>بروتين</div>
                            <div><span class="macro-val">${m.carbs}</span>كارب</div>
                            <div><span class="macro-val">${m.fat}</span>دهون</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleMeal(name, price) {
            if(selected.has(name)) {
                selected.delete(name);
                total -= price;
            } else {
                selected.add(name);
                total += price;
            }
            document.getElementById('totalPrice').innerText = total + " ريال";
            renderMeals();
        }

        function sendToWhatsApp() {
            if(selected.size === 0) return alert("اختر وجبة واحدة على الأقل");
            const list = Array.from(selected).join('%0A- ');
            const msg = `مرحباً، أود الاشتراك بوجباتي المختارة:%0A- ${list}%0Aالإجمالي: ${total} ريال`;
            window.open(`https://wa.me/966563683212?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
