<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم دايت - اطلب وجبتك الصحية</title>
    <style>
        :root {
            --primary-color: #27ae60;
            --secondary-color: #2c3e50;
            --bg-color: #f9f9f9;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; }
        header { background: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .meal-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .meal-card:hover { transform: translateY(-5px); }
        .meal-info { padding: 15px; }
        .badge { background: var(--primary-color); color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; }
        .btn-order { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .footer-cart { position: fixed; bottom: 0; width: 100%; background: var(--secondary-color); color: white; padding: 15px; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

<header>
    <h1 style="color: var(--primary-color);">Green Diet Kitchen 🥗</h1>
    <p>وجبات صحية مدروسة السعرات تصلك أينما كنت</p>
</header>

<div class="container" id="menu">
    <div class="meal-card">
        <img src="https://via.placeholder.com/400x250" alt="Meal" style="width:100%">
        <div class="meal-info">
            <span class="badge">Keto Friendly</span>
            <h3>سلمون مشوي بالكينوا</h3>
            <p style="color: #666;">450 كالوري | 35ج بروتين</p>
            <p style="font-weight: bold; color: var(--primary-color);">55 ريال</p>
            <button class="btn-order" onclick="addToCart('سلمون مشوي', 55)">أضف للسلة</button>
        </div>
    </div>
</div>

<div class="footer-cart">
    السلة: <span id="cart-count">0</span> وجبة - <button onclick="checkout()" style="background: #27ae60; border: none; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer;">إتمام الطلب عبر واتساب ✅</button>
</div>

<script>
    let cart = [];
    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
        alert(name + " تمت إضافتها لسلتك!");
    }

    function checkout() {
        if(cart.length === 0) return alert("السلة فارغة!");
        let msg = "طلب جديد من الموقع:\n";
        cart.forEach(item => msg += "- " + item.name + " (" + item.price + " ريال)\n");
        let whatsappUrl = "https://wa.me/966XXXXXXXXX?text=" + encodeURIComponent(msg); // ضع رقمك هنا
        window.open(whatsappUrl, '_blank');
    }
</script>

</body>
</html>
